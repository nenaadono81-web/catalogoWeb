<div class="container-fluid contenedor-principal">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                Agregar Película
            </div>

            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">
                            Título
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            [(ngModel)]="movie.title"
                            name="title"
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Sinopsis
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            [(ngModel)]="movie.synopsis"
                            name="synopsis"
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Año
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            [(ngModel)]="movie.year"
                            name="year"
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Cover
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            [(ngModel)]="movie.cover"
                            name="cover"
                        >
                    </div> 

                    <button
                        type="button"
                        class="btn btn-primary"
                        (click)="guardarMovie()"
                    >
                        Guardar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
